<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>vector3d — arena</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
               color: #29d68a; font: 14px/1.5 monospace; }
  /* Fill whatever viewport itch (or fullscreen) gives us. The !important
     beats winit's inline sizing; winit's ResizeObserver then reports the
     real size back to the engine, which rebuilds its swapchain to match. */
  canvas { position: absolute; inset: 0;
           width: 100% !important; height: 100% !important;
           display: block; outline: none; }
  #hint  { position: absolute; inset: 0; display: flex; align-items: center;
           justify-content: center; text-align: center; padding: 0 1em;
           pointer-events: none; text-shadow: 0 0 8px #000; }
  a { color: #35b5ff; }
</style>
</head>
<body>
<div id="hint">
  <div>
    loading the arena…<br>
    needs a <b>WebGPU</b> browser (Chrome / Edge; Firefox 141+ on Windows).<br>
    click to grab the mouse · WASD + Space · left click fires · R restarts · C for CRT
  </div>
</div>
<script type="module">
  import init from './arena.js';
  const hint = document.getElementById('hint');
  if (!navigator.gpu) {
    hint.firstElementChild.innerHTML =
      'this browser has no WebGPU — try Chrome or Edge.';
  } else {
    init().then(() => {
      // Out of the way once the arena is running.
      setTimeout(() => hint.remove(), 4000);
      hint.firstElementChild.innerHTML =
        'click to grab the mouse · WASD + Space · left click fires';
    }).catch((e) => {
      hint.firstElementChild.innerHTML =
        'failed to start: ' + e + '<br>(check the console)';
    });
  }
</script>
</body>
</html>
